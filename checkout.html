<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <!-- normalize css -->
  <link rel="stylesheet" href="./assets/css/normalize.css">
  <!-- font awesome -->
  <link rel="stylesheet" href="./assets/css/all.min.css">
  <!-- bootstrap css -->
  <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
  <!-- custom css -->
  <link rel="stylesheet" href="assets/css/cart.css">
  <link rel="stylesheet" href="./assets/css/responsive.css">
</head>
<body>
  
  <!-- Page Title -->
    <section class="py-4 header">
      <div class="container">
        <h2 class="fw-bold">Checkout</h2>
        <span class="underline"></span>
    </div>
  </section>

  <!-- Checkout Content -->
    <section class="pb-5">
    <div class="container">
    <div class="row">

      <!-- Billing Details -->
      <div class="col-lg-8">
       <div class="border rounded p-4 mb-4">

        <h5 class="fw-semibold mb-3">Billing Details</h5>
        <form>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" placeholder="John">
          </div>

          <div class="col-md-6">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" placeholder="Doe">
          </div>

          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="example@mail.com">
          </div>

          <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" placeholder="+20">
          </div>

          <div class="col-12">
            <label class="form-label">Address</label>
            <input type="text" class="form-control" placeholder="Street address">
          </div>

          <div class="col-md-6">
            <label class="form-label">City</label>
            <input type="text" class="form-control" placeholder="your city">
          </div>

          <div class="col-md-6">
            <label class="form-label">Postal Code</label>
            <input type="text" class="form-control" placeholder="enter your postal Code">
          </div>

        </div>
      </form>

       </div>
      </div>

    <!-- Order Summary -->
    <div class="col-lg-4">
          <!-- summary here -->
    </div>
    </div>
  </section>

    <!-- bootstrap js -->
  <script src="./assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
