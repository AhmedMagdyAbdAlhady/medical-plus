<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <!-- normalize css -->
    <link rel="stylesheet" href="./assets/css/normalize.css">
    <!-- font awesome -->
    <link rel="stylesheet" href="./assets/css/all.min.css">
    <!-- bootstrap css -->
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
    <!-- custom css -->
    <link rel="stylesheet" href="assets/css/cart.css">
    <link rel="stylesheet" href="./assets/css/responsive.css">
  </head>
  <body>

    <!-- Page Title -->
    <section class="py-4 header">
      <div class="container">
        <h2 class="fw-bold">Checkout</h2>
        <span class="underline"></span>
      </div>
    </section>

    <!-- Checkout Content -->
    <section class="pb-5  ">
      <div class="container">
        <div class="row checkout-content">

          <!-- Billing Details -->
          <div class="col-lg-6 ">
            <div class="billing-card p-4 mb-4 border rounded shadow">

              <h5>Billing Address</h5>
              <div class="container">
                <form>

                  <!-- First & Last Name -->
                  <div class="container">
                    <div class="row mb-3 input-fields">
                      <div class="col-md-6 form-floating form-input width">
                        <input type="text" class="form-control"
                          placeholder="Alex" id="f-name">
                        <label class="form-label">First Name</label>
                      </div>

                      <div class="col-md-6 form-floating form-input width">
                        <input type="text" class="form-control"
                          placeholder="Driver">
                        <label class="form-label">Last Name</label>
                      </div>
                    </div>
                  </div>

                  <!-- Email -->
                  <div class="mb-3 form-floating form-input">
                    <input type="email" class="form-control"
                      placeholder="username@gmail.com">
                    <label class="form-label">Email Address</label>
                  </div>

                  <!-- Street Address -->
                  <div class="mb-3 form-floating form-input">
                    <input type="text" class="form-control mb-2">
                    <label class="form-label">Street Address</label>
                    <input type="text" class="form-control">
                  </div>

                  <!-- State & City -->
                  <div class="container state-city ">
                    <div class="row mb-3 input-fields">
                      <div class="col-md-6 form-floating form-input width">

                        <select class="form-select">
                          <option>California</option>
                          <option>New York</option>
                        </select>
                        <label class="form-label">State / Province</label>
                      </div>

                      <div class="col-md-6 form-floating form-input width">
                        <input type="text" class="form-control"
                          placeholder="San Diego">
                        <label class="form-label">City</label>
                      </div>
                    </div>
                  </div>

                  <!-- Zip & Phone -->
                  <div class="container zip-phone">
                    <div class="row mb-3 input-fields">
                      <div class="col-md-6 form-floating form-input width">
                        <input type="text" class="form-control"
                          placeholder="22334">
                        <label class="form-label">Zip / Postal Code</label>
                      </div>

                      <div class="col-md-6 form-floating form-input width">
                        <input type="text" class="form-control"
                          placeholder="+123 456 789 111">
                        <label class="form-label">Phone</label>
                      </div>
                    </div>
                  </div>

                  <!-- Checkboxes -->
                  <div class="form-check mb-2 ">
                    <input class="form-check-input" type="checkbox"
                      id="sameAddress">
                    <label class="form-check-label" for="sameAddress">My billing
                      and shipping address are the same</label>
                  </div>

                  <div class="form-check">
                    <input class="form-check-input" type="checkbox"
                      id="createAccount">
                    <label class="form-check-label" for="createAccount">Create
                      an account for later use</label>
                  </div>

                </form>
              </div>

            </div>

            <div class="border rounded p-4 mb-4 payment-method shadow">

              <h5>Payment Method</h5>

              <!-- Cash on Delivery -->
              <div class="form-check border content">
                <div class="container cash">
                  
                  <label class="form-check-label" for="cod">
                    <input class="form-check-input" type="radio" name="payment"id="cod">
                    Cod
                  <p>pay with <br>
                    cash on delivery</p>
                    </label>
                </div>

              </div>

              <!-- Visa -->
              <div class="form-check mb-3">
                <input class="form-check-input" type="radio" name="payment"
                  id="visa" checked>
                <label class="form-check-label d-flex align-items-center gap-2"
                  for="visa">
                  <img src="assets/images/visa.png" height="24" alt="Visa">
                  Credit / Debit Card (Visa)
                </label>
              </div>

              <!-- Card Details -->
              <div class="row g-3 mb-4">
                <div class="col-12">
                  <input type="text" class="form-control"
                    placeholder="Card Number">
                </div>

                <div class="col-md-6">
                  <input type="text" class="form-control" placeholder="MM / YY">
                </div>

                <div class="col-md-6">
                  <input type="text" class="form-control" placeholder="CVC">
                </div>
              </div>
            </div>

          </div>

          <!-- Order Summary -->
          <div class="col-lg-4">
            <div class="order-review p-4 mb-4 border rounded shadow">
              <h6 class="fw-semibold mb-3">Order Review</h6>
              <p>3 items in card</p>

              <!-- Item -->
              <div class="d-flex align-items-start pt-3 mt-3">
                <div class="me-3">
                  <div
                    class="bg-light border rounded d-flex align-items-center justify-content-center">
                    <i class="bi bi-box text-muted fs-4"></i>
                  </div>
                </div>

                <div class="flex-grow-1">
                  <div class="d-flex justify-content-between">
                    <p class="mb-1 small fw-semibold">
                      Amet nunc, tincidunt interdum rhoncus massa
                    </p>
                    <button class="btn btn-sm text-muted p-0">
                      <i class="bi bi-x-lg"></i>
                    </button>
                  </div>

                  <div
                    class="d-flex align-items-center justify-content-between mt-2">
                    <div class="btn-group btn-group-sm" role="group">
                      <button class="btn btn-outline-secondary">−</button>
                      <button
                        class="btn btn-outline-secondary disabled">2</button>
                      <button class="btn btn-outline-secondary">+</button>
                    </div>

                    <div class="text-end">
                      <div class="text-muted small">$245.78</div>
                      <div class="fw-bold">$245.78</div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="d-flex align-items-start border-top pt-3 mt-3">
                <div class="me-3">
                  <div
                    class="bg-light border rounded d-flex align-items-center justify-content-center">
                    <i class="bi bi-box text-muted fs-4"></i>
                  </div>
                </div>

                <div class="flex-grow-1">
                  <div class="d-flex justify-content-between">
                    <p class="mb-1 small fw-semibold">
                      Amet nunc, tincidunt interdum rhoncus massa
                    </p>
                    <button class="btn btn-sm text-muted p-0">
                      <i class="bi bi-x-lg"></i>
                    </button>
                  </div>

                  <div
                    class="d-flex align-items-center justify-content-between mt-2">
                    <div class="btn-group btn-group-sm" role="group">
                      <button class="btn btn-outline-secondary">−</button>
                      <button
                        class="btn btn-outline-secondary disabled">2</button>
                      <button class="btn btn-outline-secondary">+</button>
                    </div>

                    <div class="text-end">
                      <div class="text-muted small">$245.78</div>
                      <div class="fw-bold">$245.78</div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="d-flex align-items-start border-top pt-3 mt-3">
                <div class="me-3">
                  <div
                    class="bg-light border rounded d-flex align-items-center justify-content-center"
                    style="width:48px;height:48px;">
                    <i class="bi bi-box text-muted fs-4"></i>
                  </div>
                </div>

                <div class="flex-grow-1">
                  <div class="d-flex justify-content-between">
                    <p class="mb-1 small fw-semibold">
                      Amet nunc, tincidunt interdum rhoncus massa</p>
                    <button class="btn btn-sm text-muted p-0">
                      <i class="bi bi-x-lg"></i>
                    </button>
                  </div>

                  <div
                    class="d-flex align-items-center justify-content-between mt-2">
                    <div class="btn-group btn-group-sm" role="group">
                      <button class="btn btn-outline-secondary">−</button>
                      <button
                        class="btn btn-outline-secondary disabled">2</button>
                      <button class="btn btn-outline-secondary">+</button>
                    </div>

                    <div class="text-end">
                      <div class="text-muted small">$245.78</div>
                      <div class="fw-bold">$245.78</div>
                    </div>
                  </div>
                </div>
              </div>

            </div>

            <div class="discount-code p-4 mb-4 border rounded">
              <h6 class="fw-semibold mb-3">Discount codes</h6>
              <input type="text" class="form-control"
                placeholder="enter your coupon code">
            </div>
          </div>

        </div>
      </div>
    </section>

    <!-- bootstrap js -->
    <script src="./assets/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
