<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My-cart</title>
   <!-- normalize css -->
  <link rel="stylesheet" href="./assets/css/normalize.css">
  <!-- font awesome -->
  <link rel="stylesheet" href="./assets/css/all.min.css">
  <!-- bootstrap css -->
  <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
  <!-- custom css -->
  <link rel="stylesheet" href="assets/css/cart.css">
  <link rel="stylesheet" href="./assets/css/responsive.css">
</head>
<body>
   <!-- Page Title -->
    <section class="py-4">
      <div class="container">
        <h2 class="fw-bold">My Cart</h2>
     </div>
   </section>

    <!-- Cart Content -->
    <section class="pb-5">
    <div class="container">
      <div class="row">

        <!-- Cart Items -->
        <div class="col-lg-8">
          <div class="card mb-3">

            <!-- Cart Item -->
            <div class="border rounded p-3 mb-3">
             <div class="row align-items-center">

                <!-- Image -->
                <div class="col-md-2 col-3">
                <img src="assets/images/cart-images/cart-items/betadine-mouthwash-and-gargle-.png" class="img-fluid" alt="product">
               </div>

               <!-- Product Info -->
                <div class="col-md-6 col-9">
                 <h6 class="fw-semibold mb-1"> Betadine Mouthwash And Gargle 250 Ml</h6>

                 <div class="d-flex gap-2">
                   <button class="btn btn-sm btn-outline-danger">Remove</button>
                   <button class="btn btn-sm btn-outline-primary">Save for later</button>
                </div>
               </div>

               <!-- Price + Qty -->
                <div class="col-md-4 mt-3 mt-md-0 d-flex justify-content-between align-items-center">
                 <span class="fw-semibold">Rs. 78.99</span>

                  <select class="form-select w-auto">
                   <option>Qty: 1</option>
                   <option>Qty: 2</option>
                   <option>Qty: 3</option>
                   <option>Qty: 4</option>
                 </select>
               </div>

            </div>
           </div>

           <!-- Cart Item -->
            <div class="border rounded p-3 mb-3">
             <div class="row align-items-center">

                <!-- Image -->
                <div class="col-md-2 col-3">
                <img src="assets/images/cart-images/cart-items/Panadol-Extra.png" class="img-fluid" alt="product">
               </div>

               <!-- Product Info -->
                <div class="col-md-6 col-9">
                 <h6 class="fw-semibold mb-1"> Panadol-Extra 24tables</h6>

                 <div class="d-flex gap-2">
                   <button class="btn btn-sm btn-outline-danger">Remove</button>
                   <button class="btn btn-sm btn-outline-primary">Save for later</button>
                </div>
               </div>

               <!-- Price + Qty -->
                <div class="col-md-4 mt-3 mt-md-0 d-flex justify-content-between align-items-center">
                 <span class="fw-semibold">Rs. 78.99</span>

                  <select class="form-select w-auto">
                   <option>Qty: 1</option>
                   <option>Qty: 2</option>
                   <option>Qty: 3</option>
                   <option>Qty: 4</option>
                 </select>
               </div>

            </div>
           </div>

           <!-- Cart Item -->
            <div class="border rounded p-3 mb-3">
             <div class="row align-items-center">

                <!-- Image -->
                <div class="col-md-2 col-3">
                <img src="assets/images/cart-images/cart-items/dolipranetabs-1000-mg-8-comprimes-.jpg" class="img-fluid" alt="product">
               </div>

               <!-- Product Info -->
                <div class="col-md-6 col-9">
                 <h6 class="fw-semibold mb-1"> Doliprane Tabs 1000 mg </h6>

                 <div class="d-flex gap-2">
                   <button class="btn btn-sm btn-outline-danger">Remove</button>
                   <button class="btn btn-sm btn-outline-primary">Save for later</button>
                </div>
               </div>

               <!-- Price + Qty -->
                <div class="col-md-4 mt-3 mt-md-0 d-flex justify-content-between align-items-center">
                 <span class="fw-semibold">Rs. 78.99</span>

                  <select class="form-select w-auto">
                   <option>Qty: 1</option>
                   <option>Qty: 2</option>
                   <option>Qty: 3</option>
                   <option>Qty: 4</option>
                 </select>
               </div>

            </div>
           </div>

            <div class="d-flex justify-content-between mt-4">
              <a href="#" class="btn btn-outline-primary">← Back to shop</a>
              <button class="btn btn-outline-danger"> Remove all</button>
           </div>

          </div>

        </div>

        <!-- Order Summary -->
        <div class="col-lg-4">
          <div class="border rounded p-3">

           <!-- Coupon -->
           <div class="mb-4">
             <h6 class="fw-semibold mb-2">Have a coupon?</h6>
             <div class="input-group">
              <input type="text" class="form-control" placeholder="Add coupon">
              <button class="btn btn-outline-primary">Apply</button>
            </div>
          </div>

          <hr>

          <!-- Price Details -->
          <div class="mb-3">
            <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Subtotal:</span>
             <span>Rs. 1403.97</span>
           </div>

            <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Discount:</span>
           <span class="text-danger">- Rs. 60.00</span>
           </div>

            <div class="d-flex justify-content-between mb-3">
             <span class="text-muted">Tax:</span>
             <span class="text-success">+ Rs. 14.00</span>
           </div>

          <hr>

           <div class="d-flex justify-content-between fw-bold fs-5">
             <span>Total:</span>
             <span>Rs. 1357.97</span>
          </div>
         </div>

          <!-- Checkout Button -->
            <button class="btn btn-primary w-100 mt-3"> Checkout </button>

          <!-- Payment Icons -->
          <div class="d-flex justify-content-center gap-2 mt-3">
           <img src="assets/images/cart-images/payment-icons/Logo-visa-icon-PNG.png" height="25" alt="visa">
           <img src="assets/images/cart-images/payment-icons/master-card-icon.png" height="25" alt="mastercard">
           <img src="assets/images/cart-images/payment-icons/paypal-icon.png" height="25" alt="paypal">
           <img src="assets/images/cart-images/payment-icons/instapay-icon.png" height="25" alt="instapay">
           <img src="assets/images/cart-images/payment-icons/vodafone-cash.png" height="25" alt="vodafone-cash">
           <img src="assets/images/cart-images/payment-icons/hbl-icon.png" height="25" alt="HBL">
        </div>

        </div>

        </div>

      </div>
    </div>
   </section>

   <!-- bootstrap js -->
  <script src="./assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
